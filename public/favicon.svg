<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#09090f"/>

  <!-- Movement trail (curved path, sigma purple) -->
  <path d="M 6 26 Q 10 20 14 17" stroke="#818cf8" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>
  <path d="M 10 23 Q 13 19 15.5 17" stroke="#818cf8" stroke-width="1.2" stroke-linecap="round" opacity="0.3"/>

  <!-- Crosshair — horizontal -->
  <line x1="10" y1="16" x2="14" y2="16" stroke="#e6e6f0" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="18" y1="16" x2="22" y2="16" stroke="#e6e6f0" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Crosshair — vertical -->
  <line x1="16" y1="10" x2="16" y2="14" stroke="#e6e6f0" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="18" x2="16" y2="22" stroke="#e6e6f0" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Centre dot -->
  <circle cx="16" cy="16" r="1.5" fill="#818cf8"/>

  <!-- Target ring -->
  <circle cx="16" cy="16" r="5" stroke="#e6e6f0" stroke-width="1" opacity="0.3"/>
</svg>
